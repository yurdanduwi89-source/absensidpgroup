    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbynsQsEx9bLLdGdbXmdm5jO6nV0ojTR4DPD5zNmQ1R1lTjo0HILBgYbV0q7PqLVHp-v9Q/exec";

    const google = {
        script: {
            run: new Proxy({}, {
                get: function(target, prop) {
                    if (prop === 'withSuccessHandler' || prop === 'withFailureHandler') {
                        return function(callback) { return createRunner(callback, prop); };
                    }
                    return createRunner(null, null)[prop];
                }
            })
        }
    };

    function createRunner(callback, type) {
        let successCb = type === 'withSuccessHandler' ? callback : null;
        let failureCb = type === 'withFailureHandler' ? callback : (err => console.error(err));
        
        let runner = new Proxy({}, {
            get: function(target, actionName) {
                if (actionName === 'withSuccessHandler') return function(cb) { successCb = cb; return runner; };
                if (actionName === 'withFailureHandler') return function(cb) { failureCb = cb; return runner; };
                
                return function(...args) {
                    fetch(GAS_API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: actionName, args: args })
                    })
                    .then(res => res.json())
                    .then(data => { if (successCb) successCb(data); })
                    .catch(err => { if (failureCb) failureCb(err); });
                };
            }
        });
        return runner;
    }

        js += "var profImg=null; function previewProfFoto(input){ if(input.files && input.files[0]){ var reader=new FileReader(); reader.onload=function(e){ document.getElementById('prof-preview').src=e.target.result; document.getElementById('prof-preview').style.display='block'; document.getElementById('prof-placeholder').style.display='none'; profImg=new Image(); profImg.src=e.target.result; }; reader.readAsDataURL(input.files[0]); } }";

        js += "function startClock(){updateTime();clockInt=setInterval(updateTime,1000);}function stopClock(){if(clockInt)clearInterval(clockInt);}function updateTime(){var d=new Date();var opts={timeZone:'Asia/Jakarta',hour:'numeric',minute:'2-digit',hour12:true};var parts=new Intl.DateTimeFormat('en-US',opts).formatToParts(d);var h,m,am;parts.forEach(function(p){if(p.type==='hour')h=p.value;if(p.type==='minute')m=p.value;if(p.type==='dayPeriod')am=p.value;});document.getElementById('clock').innerHTML=h+':'+m+' <span style=\"font-size:16px;font-weight:400\">'+am+'</span>';var dOpts={timeZone:'Asia/Jakarta',weekday:'long',year:'numeric',month:'long',day:'numeric'};document.getElementById('date').innerText=d.toLocaleDateString('en-US',dOpts);}";
        js += "function getLoc(){if(navigator.geolocation){navigator.geolocation.getCurrentPosition(function(p){loc.lat=p.coords.latitude;loc.lng=p.coords.longitude;var gb=document.getElementById('gps-badge');if(gb){gb.className='gps-badge locked';gb.innerHTML='<i data-lucide=\"check-circle\" style=\"width:12px\"></i> GPS LOCKED';}fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+p.coords.latitude+'&lon='+p.coords.longitude).then(function(r){return r.json();}).then(function(d){loc.alamat=d.display_name||'';var at=document.getElementById('addr-text');if(at)at.innerText=loc.alamat;var ah=document.getElementById('addr-header');if(ah)ah.innerText=d.address.city||d.address.town||'Location Found';});},function(){var at=document.getElementById('addr-text');if(at)at.innerText='GPS Error';});}}";
        js += "function doAbsen(type){";

        return js;

    function renderApp() {
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page') || 'employee';
        
        const style = document.createElement('style');
        style.innerHTML = getCSS();
        document.head.appendChild(style);

        let bodyHtml = "";
        let jsStr = "";

        if (page === "admin") {
            bodyHtml = getAdminHTML();
            jsStr = getAdminJS() + getAdminJS2() + getAdminJS3() + getAdminJS4() + getAdminJS5();
        } else if (page === "register") {
            bodyHtml = getRegisterHTML();
            jsStr = getRegisterJS();
        } else {
            bodyHtml = getEmployeeHTML();
            jsStr = getEmployeeJS();
        }

        document.getElementById('app-root').innerHTML = bodyHtml;

        const script = document.createElement('script');
        script.innerHTML = jsStr;
        document.body.appendChild(script);

        setTimeout(() => {
            window.document.dispatchEvent(new Event('DOMContentLoaded', {
                bubbles: true,
                cancelable: true
            }));
        }, 100);
    }

    renderApp();
    </script>
